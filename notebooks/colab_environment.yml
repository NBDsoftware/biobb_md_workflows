# Conda environment for running the biobb_md_workflows tutorial ON GOOGLE COLAB.
# For running the notebook on a LOCAL Jupyter, use local_environment.yml instead.
name: biobb_md_tutorial
channels:
  - conda-forge
  - bioconda
  - salilab
dependencies:
  - python==3.12
  - pip
  - biobb_common>=5.2.2
  - biobb_structure_utils>=5.2.1
  - biobb_model>=5.2.1
  - biobb_amber>=5.2.1
  - biobb_chemistry>=5.2.1
  - biobb_io>=5.2.3
  - biobb_pdb_tools>=5.2.1
  - propka==3.5.1
  - modeller>=10.8      # no license key needed for 3HTB (no backbone gaps to model)
  - mdanalysis
  - biopython
  # --- Tools that are HPC modules on the cluster, needed locally on Colab ---
  - gromacs
  - ambertools
  - acpype
  - openbabel
  # --- Visualization ---
  - nglview
  - plotly
  - numpy
  - pip:
    - biobb_gromacs @ git+https://github.com/NBDsoftware/biobb_gromacs
    - biobb_analysis @ git+https://github.com/NBDsoftware/biobb_analysis
    - biobb_md_workflows @ git+https://github.com/NBDsoftware/biobb_md_workflows.git
