# Conda environment for running the biobb_md_workflows tutorial on a LOCAL Jupyter.
# Same as colab_environment.yml (Python 3.12, full MD stack + visualization) but it
# ALSO ships jupyter + ipykernel so this one environment both builds the system and
# hosts the notebook: `conda activate biobb_md_tutorial && jupyter lab`.
# Named differently from the dev env (biobb_md) so it does not clobber it.
# NOTE: create it from the repo root so the `-e .` pip install resolves to this repo:
#   conda env create -f notebooks/local_environment.yml
name: biobb_md_tutorial
channels:
  - conda-forge
  - bioconda
  - salilab
dependencies:
  - python==3.12
  - pip
  - biobb_common>=5.2.2
  - biobb_structure_utils>=5.2.1
  - biobb_model>=5.2.1
  - biobb_amber>=5.2.1
  - biobb_chemistry>=5.2.1
  - biobb_io>=5.2.3
  - biobb_pdb_tools>=5.2.1
  - propka==3.5.1
  - modeller>=10.8      # no license key needed for 3HTB (no backbone gaps to model)
  - mdanalysis
  - biopython>=1.83
  # --- Tools that are HPC modules on the cluster, needed locally ---
  - gromacs
  - ambertools
  - acpype
  - openbabel
  # --- Notebook kernel + visualization (host + run the notebook from this env) ---
  - jupyter
  - ipykernel
  - ipywidgets
  - nglview
  - plotly
  - numpy
  - pip:
    - biobb_gromacs @ git+https://github.com/NBDsoftware/biobb_gromacs
    - biobb_analysis @ git+https://github.com/NBDsoftware/biobb_analysis
    # biobb_md_workflows itself, from the local checkout (run env-create from the repo root)
    - -e .
