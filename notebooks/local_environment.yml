# Conda environment for running the biobb_md_workflows tutorial on a LOCAL Jupyter.
# Same as colab_environment.yml
name: biobb_md_tutorial
channels:
  - conda-forge
  - bioconda
  - salilab
dependencies:
  - python==3.12
  - pip
  - pyyaml
  - biobb_common>=5.2.2
  - biobb_structure_utils>=5.2.1
  - biobb_model>=5.2.1
  - biobb_amber>=5.2.1
  - biobb_chemistry>=5.2.1
  - biobb_io>=5.2.3
  - biobb_pdb_tools>=5.2.1
  - propka==3.5.1
  - modeller>=10.8      # no license key needed for 3HTB (no backbone gaps to model)
  - mdanalysis=2.10.0
  - biopython=1.87
  # --- Tools that are HPC modules on the cluster, needed locally ---
  - ambertools=24.8
  - acpype=2023.10.27
  - openbabel=3.1.1
  # --- Notebook kernel + visualization (host + run the notebook from this env) ---
  - jupyter
  - ipykernel
  - ipywidgets
  - nglview<=4.0
  - plotly
  - numpy
  - pip:
    - biobb_md_workflows @ git+https://github.com/NBDsoftware/biobb_md_workflows
    # Forks pinned to fork-namespaced tags (nbd-*) for reproducibility.
    - biobb_gromacs @ git+https://github.com/NBDsoftware/biobb_gromacs@nbd-5.3.0
    - biobb_analysis @ git+https://github.com/NBDsoftware/biobb_analysis@nbd-5.2.1
